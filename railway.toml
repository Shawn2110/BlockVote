# Default Railway config for the Node + frontend service.
# The Ganache chain service uses Dockerfile.ganache and is created
# separately in the Railway dashboard.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node backend/server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
