<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlockVote — Login</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="floating-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="none" stroke="#58a6ff" stroke-width="2"/>
            <polygon points="24,10 36,17 36,31 24,38 12,31 12,17" fill="rgba(88,166,255,0.15)" stroke="#58a6ff" stroke-width="1.5"/>
            <circle cx="24" cy="24" r="4" fill="#58a6ff"/>
          </svg>
        </div>
        <h1>BlockVote</h1>
        <p>Decentralized Voting on Ethereum</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="voter-id">Voter ID</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="voter-id" name="voter-id" placeholder="Enter your voter ID">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Enter your password">
          </div>
        </div>

        <div id="error-msg" class="error-msg"></div>
        <button type="submit" id="loginBtn">
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" class="spinner" style="display:none"></span>
        </button>
      </form>

      <div class="login-footer">
        <span class="chain-badge">
          <span class="chain-dot"></span>
          Ethereum Blockchain
        </span>
      </div>
    </div>
  </div>

  <script src="../dist/login.bundle.js"></script>
</body>
</html>
